<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Monitor de Vagas Ryu</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%234F46E5'/><text x='50' y='68' font-size='56' text-anchor='middle' fill='white' font-family='Arial'>R</text></svg>">
<style>
:root{
  --bg:#F4F6FB; --card:#FFFFFF; --ink:#0F1729; --ink2:#1F2937; --muted:#6B7280; --line:#EAEDF3;
  --primary:#4F46E5; --primary-soft:#EEF0FF;
  --estagio:#4F46E5; --junior:#0EA5E9; --trainee:#8B5CF6;
  --alto:#10B981; --medioalto:#14B8A6; --medio:#F59E0B;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
  --maxw:480px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink2);font-family:var(--sans);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{display:block}
.app{max-width:var(--maxw);margin:0 auto;min-height:100vh;background:var(--bg);position:relative;padding-bottom:88px}
.screen{padding:16px 16px 8px}
.fade-in{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---------- HERO ---------- */
.hero{background:linear-gradient(135deg,#1E1B4B 0%,#312E81 55%,#4F46E5 120%);border-radius:22px;padding:18px;color:#fff;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(255,255,255,.14),transparent 70%);border-radius:50%}
.hero-top{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.avatar{width:54px;height:54px;border-radius:50%;border:2px solid rgba(255,255,255,.5);object-fit:cover;flex:0 0 auto;background:#fff}
.hello{font-size:13px;color:#C7D2FE}
.hello b{color:#fff}
.hero h1{font-size:20px;font-weight:800;line-height:1.15;margin-top:2px}
.hero-sub{font-size:12.5px;color:#C7D2FE;margin-top:8px;position:relative;z-index:1;line-height:1.4}
.hero-stats{display:flex;gap:8px;margin-top:14px;position:relative;z-index:1}
.hstat{flex:1;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:13px;padding:9px 10px}
.hstat .n{font-size:20px;font-weight:800;line-height:1}
.hstat .l{font-size:10.5px;color:#C7D2FE;margin-top:3px}
.radar-chip{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:rgba(16,185,129,.16);border:1px solid rgba(16,185,129,.4);color:#6EE7B7;font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;position:relative;z-index:1}
.dot{width:7px;height:7px;border-radius:50%;background:#34D399;box-shadow:0 0 0 0 rgba(52,211,153,.6);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}70%{box-shadow:0 0 0 7px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}

/* ---------- FILTROS ---------- */
.search{position:relative;margin:16px 0 10px}
.search input{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px 14px 12px 40px;font-size:14px;font-family:inherit;color:var(--ink2)}
.search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:13px;font-weight:600;padding:8px 14px;border-radius:999px;cursor:pointer;transition:.15s}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ---------- JOB CARD ---------- */
.jcard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;margin-top:12px;box-shadow:0 1px 2px rgba(16,24,40,.04)}
.jtop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.tipo-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;display:inline-block}
.emp{font-size:16px;font-weight:800;color:var(--ink);margin-top:8px;line-height:1.2}
.vg{font-size:13.5px;color:var(--ink2);margin-top:3px;line-height:1.35}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.mtag{font-size:11px;color:var(--muted);background:#F3F5F9;border-radius:8px;padding:4px 8px;display:inline-flex;align-items:center;gap:4px}
.why{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.45}
.jbtm{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:13px;padding-top:13px;border-top:1px solid var(--line)}
.ring{flex:0 0 auto}
.statuswrap{flex:1;min-width:0}
.statuswrap label{font-size:10.5px;color:var(--muted);display:block;margin-bottom:3px}
select{width:100%;font-family:inherit;font-size:12.5px;font-weight:600;border:1px solid var(--line);border-radius:10px;padding:7px 8px;background:#fff;color:var(--ink2);cursor:pointer}
select:focus{outline:none;border-color:var(--primary)}
.open-btn{flex:0 0 auto;background:var(--primary);color:#fff;font-size:13px;font-weight:700;padding:9px 14px;border-radius:12px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:.15s}
.open-btn:active{transform:scale(.97)}
.elig{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:10px}

/* ---------- SECTIONS ---------- */
.sec-title{font-size:18px;font-weight:800;color:var(--ink);margin:4px 2px 2px}
.sec-sub{font-size:13px;color:var(--muted);margin:0 2px 14px;line-height:1.4}
.group{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;margin-top:12px}
.group-h{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.gico{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;color:#fff;flex:0 0 auto}
.group-h h3{font-size:14.5px;font-weight:700;color:var(--ink)}
.lnk{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:14px;font-weight:600;color:var(--ink2);margin-top:8px;transition:.15s}
.lnk:active{background:#F3F5F9}
.lnk svg{color:var(--muted)}

/* rotina */
.obj{display:flex;align-items:center;gap:11px;padding:11px 2px;cursor:pointer;border-bottom:1px solid var(--line)}
.obj:last-child{border-bottom:none}
.box{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center;color:#fff;transition:.15s}
.box.on{background:var(--alto);border-color:var(--alto)}
.obj span.t{font-size:13.5px;color:var(--ink2)}
.obj .t.done{color:var(--muted);text-decoration:line-through}

/* perfil */
.pcard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;text-align:center;margin-bottom:14px}
.pavatar{width:96px;height:96px;border-radius:50%;margin:0 auto;border:3px solid var(--primary-soft);object-fit:cover}
.pname{font-size:20px;font-weight:800;color:var(--ink);margin-top:12px}
.prole{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.4}
.pblock{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px}
.pblock h4{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:9px}
.about{font-size:13.5px;color:var(--ink2);line-height:1.55}
.skills{display:flex;flex-wrap:wrap;gap:7px}
.skill{font-size:12px;font-weight:600;color:var(--primary);background:var(--primary-soft);border-radius:999px;padding:6px 11px}
.sal{display:flex;justify-content:space-between;align-items:center;padding:10px 2px;border-bottom:1px solid var(--line)}
.sal:last-child{border-bottom:none}
.sal .k{font-size:13.5px;font-weight:600;color:var(--ink2)}
.sal .v{font-size:13.5px;font-weight:700;color:var(--ink)}

.rec{font-size:10.5px;font-weight:700;color:var(--alto);background:rgba(16,185,129,.12);padding:2px 7px;border-radius:999px;margin-left:6px;white-space:nowrap}
.how .hrow{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)}
.how .hrow:last-child{border-bottom:none}
.hico{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:#fff;flex:0 0 auto}
.how b{font-size:13px;color:var(--ink)}
.how p{font-size:12px;color:var(--muted);line-height:1.45;margin-top:2px}
.src{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
.srcpill{font-size:11.5px;font-weight:700;color:var(--ink2);background:#F3F5F9;border:1px solid var(--line);border-radius:999px;padding:4px 10px}

.hstat{cursor:pointer;transition:transform .12s ease, background .15s ease;user-select:none}
.hstat:active{transform:scale(.95)}
.hstat.on{background:rgba(255,255,255,.24);border-color:rgba(255,255,255,.55)}
.radar-chip.loading{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25);color:#C7D2FE}
.spin{width:11px;height:11px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#C7D2FE;display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sorthint{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);margin:16px 2px 0;font-weight:600}
.sorthint svg{color:var(--junior)}
.clearbtn{margin-top:12px;background:var(--primary);color:#fff;border:0;font-size:13px;font-weight:700;padding:9px 16px;border-radius:11px;cursor:pointer}
.jcard{transition:transform .12s ease, box-shadow .12s ease}
.jcard:active{transform:scale(.995);box-shadow:0 4px 14px rgba(16,24,40,.08)}
.chip:active{transform:scale(.94)}
.lnk:active{transform:scale(.99)}
.open-btn:active{transform:scale(.96)}

/* ---------- BOTTOM NAV ---------- */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--maxw);
  background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:50}
.navbtn{flex:1;background:none;border:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;color:var(--muted);font-size:11px;font-weight:600;transition:.15s}
.navbtn.on{color:var(--primary)}
.navbtn .ind{width:20px;height:3px;border-radius:3px;background:transparent;margin-bottom:-2px}
.navbtn.on .ind{background:var(--primary)}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 20px;background:#fff;border:1px solid var(--line);border-radius:16px;margin-top:12px}
.foot{font-size:11px;color:var(--muted);text-align:center;line-height:1.6;padding:18px 10px 6px}
</style>
</head>

  {site:"Glassdoor",url:"https://www.glassdoor.com.br/Vaga/s%C3%A3o-paulo-estagi%C3%A1rio-financeiro-vagas-SRCH_IL.0,9_IC2479061_KO10,31.htm"}]},
 {grupo:"Júnior · Planejamento",color:"var(--junior)",links:[
  {site:"LinkedIn",url:"https://www.linkedin.com/jobs/search/?keywords=analista%20j%C3%BAnior%20planejamento%20financeiro%20FP%26A&location=S%C3%A3o%20Paulo%2C%20Brazil&f_TPR=r604800"},
  {site:"Indeed",url:"https://br.indeed.com/jobs?q=analista+j%C3%BAnior+planejamento+financeiro&l=S%C3%A3o+Paulo%2C+SP&fromage=7"},
  {site:"Gupy",url:"https://portal.gupy.io/job-search/term=analista%20financeiro%20j%C3%BAnior"},
  {site:"Glassdoor",url:"https://www.glassdoor.com.br/Vaga/s%C3%A3o-paulo-analista-financeiro-j%C3%BAnior-vagas-SRCH_IL.0,9_IC2479061_KO10,36.htm"}]},
 {grupo:"Trainee · Finanças",color:"var(--trainee)",links:[
  {site:"Seja Trainee",url:"https://sejatrainee.com.br/vagas-de-trainee-com-inscricoes-abertas/"},
  {site:"LinkedIn",url:"https://www.linkedin.com/jobs/search/?keywords=trainee%20finan%C3%A7as&location=S%C3%A3o%20Paulo%2C%20Brazil&f_TPR=r604800"},
  {site:"Gupy",url:"https://portal.gupy.io/job-search/term=trainee%20finan%C3%A7as"}]}
];

var ROUTINE = [
 "Abrir as buscas da semana (Estágio, Júnior e Trainee) tocando nos botões de cada site na aba Radar",
 "Revisar as vagas novas trazidas pelo radar e marcar o status de cada uma",
 "Candidatar-se às vagas que você marcou como “A candidatar”",
 "Conferir os portais próprios das empresas: Elo (Gupy) e Robert Half",
 "Atualizar o currículo quando notar um requisito que se repete nas vagas"
];

var SKILLS = ["Power BI","Excel avançado","Python","SQL","Budget & Forecast","Pricing / ASP","Análise de crédito","Inglês C2"];
var SALARY = [["Estágio","R$ 1,5k – 2,8k"],["Analista Jr","R$ 3,8k – 6,5k"],["Trainee","R$ 7k – 10k"]];
var PROFILE_TXT = "Estudante de Economia no IBMEC (2024–2028), estagiando em Finanças na Ferring: análise de crédito, pricing/ASP, dashboards em Power BI e suporte a orçamento. Base em Python e SQL, inglês C2. Foco em análise financeira, planejamento e BI.";

/* ===================== TEMA / MAPS ===================== */
var TIPOC = {"Estágio":"var(--estagio)","Júnior":"var(--junior)","Trainee":"var(--trainee)"};
var FITC = {"Alto":"var(--alto)","Médio-Alto":"var(--medioalto)","Médio":"var(--medio)"};
var FITPCT = {"Alto":92,"Médio-Alto":70,"Médio":50};
var STATUS_OPTS = ["A pesquisar","A candidatar","Candidatado","Em processo","Entrevista","Descartado","Acompanhar (futuro)"];
function statColor(s){
  if(s==="A candidatar")return {b:"#10B981",t:"#047857",bg:"#ECFDF5"};
  if(s==="Candidatado"||s==="Em processo"||s==="Entrevista")return {b:"#0EA5E9",t:"#0369A1",bg:"#F0F9FF"};
  if(s==="Descartado")return {b:"#E5E7EB",t:"#9CA3AF",bg:"#F9FAFB"};
  if(s==="Acompanhar (futuro)")return {b:"#8B5CF6",t:"#6D28D9",bg:"#F5F3FF"};
  return {b:"#EAEDF3",t:"#1F2937",bg:"#FFFFFF"};
}

/* ===================== ESTADO ===================== */
function load(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f;}catch(e){return f;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
var defS={}; JOBS.forEach(function(j){defS[j.id]="A pesquisar";});
JOBS.forEach(function(j){ if(j.star)defS[j.id]="A candidatar"; });
var st={ tab:"vagas", query:"", tipo:"Todos", onlyCand:false, loading:true,
  statuses:load("ryu:statuses",defS), routine:load("ryu:routine",ROUTINE.map(function(){return false;})),
  live:[], updated:"" };
function status(id){return st.statuses[id]||"A pesquisar";}

function allJobs(){
  var seen={},out=[];
  JOBS.forEach(function(j){seen[j.link]=1;out.push(j);});
  st.live.forEach(function(j){if(j&&j.link&&!seen[j.link]){seen[j.link]=1;out.push(j);}});
  return out;
}
function fitPct(j){ if(typeof j.score==="number")return Math.round(j.score*100); return FITPCT[j.fit]||60; }
function counts(){var c={"Estágio":0,"Júnior":0,"Trainee":0,cand:0};
  allJobs().forEach(function(j){c[j.tipo]=(c[j.tipo]||0)+1; if(status(j.id)==="A candidatar")c.cand++;});return c;}
function filtered(){var q=st.query.trim().toLowerCase();
  return allJobs().filter(function(j){
    if(st.tipo!=="Todos"&&j.tipo!==st.tipo)return false;
    if(st.onlyCand&&status(j.id)!=="A candidatar")return false;
    if(!q)return true;
    return (j.empresa+" "+j.vaga+" "+(j.area||"")+" "+j.local).toLowerCase().indexOf(q)>=0;});}

/* aprendizado por feedback: aprende com os status marcados e reordena */
var STOP={"de":1,"da":1,"do":1,"das":1,"dos":1,"para":1,"com":1,"que":1,"uma":1,"financeiro":0};
function tok(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
  .replace(/[^a-z0-9& ]/g," ").split(/\s+/).filter(function(w){return w.length>=3&&STOP[w]!==1;});}
var POS_ST={"A candidatar":1,"Candidatado":1,"Em processo":1,"Entrevista":1,"Acompanhar (futuro)":1};
function learn(){
  var pos={},neg={},P=0,N=0;
  allJobs().forEach(function(j){
    var s=status(j.id); if(s==="A pesquisar")return;
    var t=tok(j.empresa+" "+j.vaga+" "+(j.area||""));
    if(POS_ST[s]){P++;t.forEach(function(k){pos[k]=(pos[k]||0)+1;});}
    else if(s==="Descartado"){N++;t.forEach(function(k){neg[k]=(neg[k]||0)+1;});}
  });
  return {pos:pos,neg:neg,P:P,N:N};
}
function affinity(j,m){
  if(m.P===0&&m.N===0)return 0;
  var t=tok(j.empresa+" "+j.vaga+" "+(j.area||"")),a=0;
  t.forEach(function(k){a+=(m.pos[k]||0)/(m.P||1)-(m.neg[k]||0)/(m.N||1);});
  return a;
}

/* ===================== ÍCONES ===================== */
function ic(p,s){s=s||20;return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}
var I_SEARCH='<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>';
var I_EXT='<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>';
var I_PIN='<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>';
var I_CHECK='<polyline points="20 6 9 17 4 12"/>';
var I_BRIEF='<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>';
var I_RADAR='<path d="M19.07 4.93A10 10 0 0 0 6.99 3.34"/><path d="M4 6h.01"/><path d="M2.29 9.62A10 10 0 1 0 21.31 8.35"/><path d="M16.24 7.76A6 6 0 1 0 8.23 16.67"/><path d="M12 18h.01"/><path d="M17.99 11.66A6 6 0 0 1 15.77 16.67"/><circle cx="12" cy="12" r="2"/><path d="m13.41 10.59 5.66-5.66"/>';
var I_USER='<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>';
var I_SPARK='<path d="M12 3l1.8 5.4L19 10l-5.2 1.6L12 17l-1.8-5.4L5 10l5.2-1.6z"/>';
var I_CAL='<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>';
var I_REFRESH='<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>';

function fitRing(pct,color){
  var r=15,c=2*Math.PI*r,off=c*(1-pct/100);
  return '<svg width="44" height="44" viewBox="0 0 40 40">'
   +'<circle cx="20" cy="20" r="15" fill="none" stroke="#EEF0F4" stroke-width="4"/>'
   +'<circle cx="20" cy="20" r="15" fill="none" stroke="'+color+'" stroke-width="4" stroke-linecap="round" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 20 20)"/>'
   +'<text x="20" y="24" text-anchor="middle" font-size="11" font-weight="800" fill="'+color+'" font-family="Arial">'+pct+'</text></svg>';
}

/* ===================== TELAS ===================== */
function jobCard(j,rec){
  var col=TIPOC[j.tipo]||"#888", fc=FITC[j.fit]||"var(--medio)", pct=fitPct(j), sc=statColor(status(j.id));
  return '<div class="jcard">'
   +'<div class="jtop"><div style="min-width:0">'
   +'<span class="tipo-tag" style="color:'+col+';background:'+col+'14">'+esc(j.tipo)+(j.star?' · ★':'')+'</span>'+(rec?'<span class="rec">↑ recomendada</span>':'')
   +'<div class="emp">'+esc(j.empresa)+'</div><div class="vg">'+esc(j.vaga)+'</div></div>'
   +'<div class="ring">'+fitRing(pct,fc)+'</div></div>'
   +'<div class="meta"><span class="mtag">'+ic(I_PIN,12)+esc(j.local)+'</span>'+(j.area?'<span class="mtag">'+esc(j.area)+'</span>':'')+'</div>'
   +'<div class="why">'+esc(j.why)+'</div>'
   +'<div class="elig">⚠ '+esc(j.elig)+'</div>'
   +'<div class="jbtm"><div class="statuswrap"><label>Status</label>'
   +'<select data-id="'+esc(j.id)+'" style="border-color:'+sc.b+';color:'+sc.t+';background:'+sc.bg+'">'+STATUS_OPTS.map(function(o){return '<option'+(status(j.id)===o?' selected':'')+'>'+esc(o)+'</option>';}).join('')+'</select></div>'
   +'<a class="open-btn" href="'+esc(j.link)+'" target="_blank" rel="noopener noreferrer">Abrir '+ic(I_EXT,15)+'</a></div>'
   +'</div>';
}

function screenVagas(){
  var c=counts(), m=learn();
  var list=filtered().slice().sort(function(a,b){return (fitPct(b)+9*affinity(b,m))-(fitPct(a)+9*affinity(a,m));});
  var radarChip = st.loading
    ? '<div class="radar-chip loading"><span class="spin"></span> Sincronizando radar…</div>'
    : (st.live.length
      ? '<div class="radar-chip"><span class="dot"></span> Radar: '+st.live.length+' vagas novas · '+esc(st.updated)+'</div>'
      : '<div class="radar-chip"><span class="dot"></span> Radar ativo · atualiza sexta às 17h</div>');
  function hs(key,n,label){var on=(key==="cand"?st.onlyCand:(st.tipo===key&&!st.onlyCand));
    return '<div class="hstat'+(on?' on':'')+'" data-hstat="'+key+'"><div class="n">'+n+'</div><div class="l">'+label+'</div></div>';}
  var learned=(m.P||m.N);
  var hint = list.length ? '<div class="sorthint">'+ic(I_SPARK,13)+' Ordenado por aderência'+(learned?' + seu feedback':'')+'</div>' : '';
  var clear = (st.query||st.tipo!=="Todos"||st.onlyCand) ? '<br><button class="clearbtn" id="clear">Limpar filtros</button>' : '';
  var cards = list.length
    ? list.map(function(j){return jobCard(j, affinity(j,m)>0.5 && status(j.id)==="A pesquisar");}).join('')
    : '<div class="empty">Nenhuma vaga com esse filtro.'+clear+'</div>';
  return '<div class="screen fade-in">'
   +'<div class="hero"><div class="hero-top"><img class="avatar" src="'+AVATAR+'" alt="Ryu"/>'
   +'<div><div class="hello">Olá, <b>Ryu</b> 👋</div><h1>Suas vagas de hoje</h1></div></div>'
   +'<div class="hero-sub">Economia IBMEC · Finanças na Ferring · São Paulo</div>'
   +'<div class="hero-stats">'+hs("Estágio",c["Estágio"],"Estágios")+hs("Júnior",c["Júnior"],"Júnior")+hs("Trainee",c["Trainee"],"Trainee")+hs("cand",c.cand,"A candidatar")+'</div>'
   +radarChip+'</div>'
   +'<div class="search">'+ic(I_SEARCH,18)+'<input id="q" placeholder="Buscar empresa, vaga, área…" value="'+esc(st.query)+'"/></div>'
   +'<div class="chips">'+["Todos","Estágio","Júnior","Trainee"].map(function(t){return '<button class="chip'+(st.tipo===t&&!st.onlyCand?' on':'')+'" data-tipo="'+t+'">'+t+'</button>';}).join('')+'</div>'
   +hint+cards+'<div class="foot">Toque em “Abrir” para ir à vaga. Cards curados abrem o site oficial; vagas do radar abrem o anúncio direto.</div>'
   +'</div>';
}

function screenRadar(){
  var done=st.routine.filter(Boolean).length;
  var bays=LAUNCHERS.map(function(g){
    return '<div class="group"><div class="group-h"><span class="gico" style="background:'+g.color+'">'+ic(I_RADAR,18)+'</span><h3>'+esc(g.grupo)+'</h3></div>'
     +g.links.map(function(l){return '<a class="lnk" href="'+esc(l.url)+'" target="_blank" rel="noopener noreferrer">'+esc(l.site)+ic(I_EXT,16)+'</a>';}).join('')+'</div>';
  }).join('');
  var objs=ROUTINE.map(function(s,i){return '<div class="obj" data-obj="'+i+'"><span class="box'+(st.routine[i]?' on':'')+'">'+(st.routine[i]?ic(I_CHECK,14):'')+'</span><span class="t'+(st.routine[i]?' done':'')+'">'+esc(s)+'</span></div>';}).join('');
  return '<div class="screen fade-in">'
   +'<div class="sec-title">Busca da semana</div>'
   +'<div class="sec-sub">Um toque por site abre a busca pronta pro perfil, filtrada pelos últimos 7 dias.</div>'
   +bays
   +'<div class="group"><div class="group-h"><span class="gico" style="background:var(--alto)">'+ic(I_CHECK,18)+'</span><h3>Rotina ('+done+'/'+ROUTINE.length+')</h3></div>'+objs+'</div>'
   +'<div class="foot">'+(st.updated?'Radar sincronizado em '+esc(st.updated)+'.':'O radar roda toda sexta às 17h e atualiza as vagas.')+'</div>'
   +'</div>';
}

function screenPerfil(){
  return '<div class="screen fade-in">'
   +'<div class="pcard"><img class="pavatar" src="'+AVATAR+'" alt="Ryu"/>'
   +'<div class="pname">Enzo Ryu Yamada</div>'
   +'<div class="prole">Estagiário de Finanças · Ferring<br>Economia · IBMEC (2024–2028)</div></div>'
   +'<div class="pblock"><h4>Como o radar funciona</h4><div class="how">'
     +'<div class="hrow"><span class="hico" style="background:var(--alto)">'+ic(I_CAL,16)+'</span><div><b>Toda sexta, no fim do dia (17h)</b><p>Vagas novas entram sozinhas no painel — você não precisa fazer nada.</p></div></div>'
     +'<div class="hrow"><span class="hico" style="background:var(--estagio)">'+ic(I_RADAR,16)+'</span><div><b>Busca automática via APIs</b><p>Fontes oficiais consultadas a cada rodada:</p><div class="src"><span class="srcpill">Adzuna</span><span class="srcpill">Jooble</span></div></div></div>'
     +'<div class="hrow"><span class="hico" style="background:var(--junior)">'+ic(I_SPARK,16)+'</span><div><b>Ranqueamento com machine learning</b><p>Cada vaga recebe uma nota de aderência (0–100) ao perfil do Enzo, por similaridade de texto (TF‑IDF + cosseno, via scikit‑learn).</p></div></div>'
     +'<div class="hrow"><span class="hico" style="background:var(--trainee)">'+ic(I_REFRESH,16)+'</span><div><b>Aprende com o seu feedback</b><p>Ao marcar “A candidatar” ou “Descartado”, o painel ajusta as preferências e reordena a lista, priorizando vagas parecidas com as que você curtiu (marcadas com “↑ recomendada”).</p></div></div>'
   +'</div></div>'
   +'<div class="pblock"><h4>Sobre</h4><div class="about">'+esc(PROFILE_TXT)+'</div></div>'
   +'<div class="pblock"><h4>Competências</h4><div class="skills">'+SKILLS.map(function(s){return '<span class="skill">'+esc(s)+'</span>';}).join('')+'</div></div>'
   +'<div class="pblock"><h4>Faixas salariais · SP (ref.)</h4>'+SALARY.map(function(p){return '<div class="sal"><span class="k">'+esc(p[0])+'</span><span class="v">'+esc(p[1])+'</span></div>';}).join('')+'</div>'
   +'<div class="foot">Valores de referência (mensais). Estágio é o foco agora; júnior e trainee são os próximos passos.</div>'
   +'</div>';
}

function navBar(){
  function b(id,label,icon){return '<button class="navbtn'+(st.tab===id?' on':'')+'" data-tab="'+id+'"><span class="ind"></span>'+ic(icon,22)+'<span>'+label+'</span></button>';}
  return '<div class="nav">'+b("vagas","Vagas",I_BRIEF)+b("radar","Radar",I_RADAR)+b("perfil","Perfil",I_USER)+'</div>';
}

/* ===================== RENDER ===================== */
function render(){
  var body = st.tab==="vagas"?screenVagas():st.tab==="radar"?screenRadar():screenPerfil();
  document.getElementById("app").innerHTML = body + navBar();
  bind();
}
function bind(){
  document.querySelectorAll("[data-tab]").forEach(function(b){b.onclick=function(){st.tab=this.getAttribute("data-tab");window.scrollTo(0,0);render();};});
  var q=document.getElementById("q");
  if(q)q.oninput=function(){st.query=this.value;var p=this.selectionStart;render();var n=document.getElementById("q");if(n){n.focus();try{n.setSelectionRange(p,p);}catch(e){}}};
  document.querySelectorAll("[data-tipo]").forEach(function(b){b.onclick=function(){st.tipo=this.getAttribute("data-tipo");st.onlyCand=false;render();};});
  document.querySelectorAll("[data-hstat]").forEach(function(b){b.onclick=function(){var k=this.getAttribute("data-hstat");
    if(k==="cand"){st.onlyCand=!st.onlyCand;st.tipo="Todos";}else{st.tipo=(st.tipo===k&&!st.onlyCand)?"Todos":k;st.onlyCand=false;}
    window.scrollTo(0,0);render();};});
  var cl=document.getElementById("clear");
  if(cl)cl.onclick=function(){st.query="";st.tipo="Todos";st.onlyCand=false;render();};
  document.querySelectorAll("select[data-id]").forEach(function(s){s.onchange=function(){st.statuses[this.getAttribute("data-id")]=this.value;save("ryu:statuses",st.statuses);render();};});
  document.querySelectorAll("[data-obj]").forEach(function(r){r.onclick=function(){var i=+this.getAttribute("data-obj");st.routine[i]=!st.routine[i];save("ryu:routine",st.routine);render();};});
}

/* ===================== BOOT ===================== */
render();
fetch("./jobs.json?ts="+Date.now(),{cache:"no-store"})
 .then(function(r){return r.ok?r.json():null;})
 .then(function(d){st.loading=false;if(d&&d.jobs&&d.jobs.length){st.live=d.jobs;st.updated=d.updated_at||"";}render();})
 .catch(function(){st.loading=false;render();});
</script>
